<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="A production-grade cloud productivity application for tasks, habits, and deadlines" />

  <!-- Preconnect to font origins for faster DNS/TLS -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Inter font with display=swap for instant text rendering -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Material Symbols — load non-blocking so it doesn't delay first paint -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    media="print" onload="this.media='all'" />
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet" />
  </noscript>

  <title>Productiv — Focus. Track. Achieve.</title>

  <!-- Inline critical CSS for instant skeleton loader -->
  <style>
    .app-skeleton {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      flex-direction: column;
      gap: 16px;
    }

    .app-skeleton-logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      animation: skeleton-pulse 1.2s ease-in-out infinite;
    }

    .app-skeleton-text {
      font-size: 18px;
      font-weight: 600;
      color: #e2e2e8;
      letter-spacing: -0.01em;
      opacity: 0.9;
    }

    .app-skeleton-bar {
      width: 120px;
      height: 3px;
      border-radius: 3px;
      background: linear-gradient(90deg, transparent, #6366f1, transparent);
      animation: skeleton-shimmer 1.5s ease-in-out infinite;
    }

    @keyframes skeleton-pulse {

      0%,
      100% {
        opacity: 0.6;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.05);
      }
    }

    @keyframes skeleton-shimmer {
      0% {
        opacity: 0.3;
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: 0.3;
      }
    }
  </style>
</head>

<body>
  <!-- Branded skeleton visible instantly before JS loads -->
  <div id="root">
    <div class="app-skeleton">
      <div class="app-skeleton-logo"></div>
      <div class="app-skeleton-text">Productiv</div>
      <div class="app-skeleton-bar"></div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
